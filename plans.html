<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intervu AI - Engineering Roadmap & Feature Plans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #030303;
      --bg-card: rgba(13, 13, 13, 0.7);
      --border-color: rgba(63, 63, 70, 0.4);
      --border-glow: rgba(16, 185, 129, 0.15);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      
      --accent-emerald: #10b981;
      --accent-teal: #14b8a6;
      --accent-cyan: #06b6d4;
      --accent-violet: #8b5cf6;
      --accent-rose: #f43f5e;
      --accent-amber: #f59e0b;
      
      --font-display: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font-display);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Ambient background glows */
    .glow-container {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .glow-1 {
      position: absolute;
      top: -10%;
      left: 30%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .glow-2 {
      position: absolute;
      bottom: -10%;
      right: 10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
      border-radius: 50%;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Header styling placeholder */
    header {
      margin-bottom: 48px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      background: linear-gradient(to right, #ffffff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0d0d0d;
    }
    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }
  </style>
</head>
<body>
  <div class="glow-container">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="container">
    <header>
      <h1>Intervu AI Engineering Roadmap</h1>
      <p style="color: var(--text-secondary);">Designing the next generation of voice-first technical interview practice.</p>
    </header>
    
    <main>
      <p style="color: var(--text-muted);">Roadmap content initialized.</p>
    </main>
  </div>
</body>
</html>
